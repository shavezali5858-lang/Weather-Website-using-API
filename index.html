<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>weather app</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

</head>
<body>

<div class="mainbox">
    <h1>WEATHER </h1>
    <div class="search">
        <input id="inputbox" type="text" placeholder="enter city name">
        
        <button>
            <i class="fa-solid fa-magnifying-glass"></i>
        </button>
        
    </div>
    
        <p class="error">invalid city name</p>
    
  
<img src="clear.png" class="weathericon" > 

    
    <div class="weather">
        <h1 class="weather-heading">30°C</h1>
        <h1 class="city"></h1>
    </div>
    <div class="details">

    <div class="humidity">
        <img src="humidity.png" alt="">
        <h1 class="humidity-para"></h1>
        <p>humidity</p>
        
        
    </div>

    <div class="wind">
        <img src="wind.png" alt="">
        <h1 class="wind-para"></h1>
        <p>windspeed</p>
    </div>

    </div>

    







</div>



















    <script src="main.js"></script>
</body>
</html>
